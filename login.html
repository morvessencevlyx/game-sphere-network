<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Sphere Network</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="logo">
                <h1>🌠 Game Sphere Network</h1>
                <p>Login to Your Account</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-primary">Login</button>
                
                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="js/database.js"></script>
    <script>
        window.onload = function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                if (user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'member-dashboard.html';
                }
            }
        };
        
        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Please enter email and password!', 'error');
                return;
            }
            
            const user = DB.findByField('users', 'email', email);
            
            if (!user) {
                showMessage('No account found with this email!', 'error');
                return;
            }
            
            if (user.password !== password) {
                showMessage('Invalid password!', 'error');
                return;
            }
            
            if (user.isBanned === 'yes') {
                showMessage('⛔ Your account is banned. Contact support!', 'error');
                return;
            }
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            showMessage('✅ Welcome back, ' + user.username + '!', 'success');
            
            setTimeout(() => {
                if (user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'member-dashboard.html';
                }
            }, 1000);
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }
    </script>
</body>
</html>
